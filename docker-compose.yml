services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # The command is now handled by the robust entrypoint.sh script.
    command: entrypoint.sh gunicorn --bind 0.0.0.0:8000 --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker "wsgi:app"
    volumes:
      - ./backend:/home/app/web
    ports:
      - "8000:8000"
    user: "${UID}:${GID}"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A worker.celery_app worker --loglevel=info -P gevent --concurrency=1
    volumes:
      - ./backend:/home/app/web
    user: "${UID}:${GID}"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
